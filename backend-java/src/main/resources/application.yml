server:
  port: ${PORT:10000}
  address: 0.0.0.0

spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

app:
  jwt:
    secret: ${JWT_SECRET}
    issuer: kutlwano-enterprise
    access-token-minutes: 30
  cors:
    allowed-origin: ${FRONTEND_URL:http://localhost:5173}

bootstrap:
  admin:
    enabled: ${BOOTSTRAP_ADMIN_ENABLED:false}
    username: ${BOOTSTRAP_ADMIN_USERNAME:}
    email: ${BOOTSTRAP_ADMIN_EMAIL:}
    password: ${BOOTSTRAP_ADMIN_PASSWORD:}
    first-name: ${BOOTSTRAP_ADMIN_FIRST_NAME:}
    last-name: ${BOOTSTRAP_ADMIN_LAST_NAME:}
