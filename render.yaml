services:
  - type: web
    name: kutlwano-medico-legal-internal-system
    runtime: static
    buildCommand: npm run validate
    staticPublishPath: apps/internal
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
