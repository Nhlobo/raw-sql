services:
  - type: web
    name: kutlwano-api
    runtime: node
    plan: starter
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @kutlwano/api build
    preDeployCommand: pnpm --filter @kutlwano/api migrate
    startCommand: pnpm --filter @kutlwano/api start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: kutlwano-postgres
          property: connectionString
      - key: NODE_ENV
        value: production
  - type: static
    name: kutlwano-web
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @kutlwano/web build
    staticPublishPath: apps/web/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
databases:
  - name: kutlwano-postgres
    plan: starter
